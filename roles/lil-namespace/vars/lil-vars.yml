lil_backend_secrets: "{{ lookup('pipe', 'keybase fs read /keybase/team/epfl_lil/backend/' ~ inventory_environment ~ '/secrets.yml') | from_yaml }}"

database_url: >-
  postgresql://{{ lil_backend_secrets.database.user }}:{{ lil_backend_secrets.database.password }}@{{ lil_backend_secrets.database.host }}:{{ lil_backend_secrets.database.port }}/{{ lil_backend_secrets.database.name }}?schema=public

openid_connect:
  test:
    # https://app-portal.epfl.ch/app-details/2fa05693-86ed-4826-852b-ea49b919441d
    base_url: https://login.microsoftonline.com/f6c2556a-c4fb-4ab1-a2c7-9e220df11c43/v2.0
    client_id: 2fa05693-86ed-4826-852b-ea49b919441d
  prod:
    # https://app-portal.epfl.ch/app-details/a8e818b8-1774-4118-9ec1-4bf369fb631a
    base_url: https://login.microsoftonline.com/f6c2556a-c4fb-4ab1-a2c7-9e220df11c43/v2.0
    client_id: a8e818b8-1774-4118-9ec1-4bf369fb631a

image_tag: >-
  {{ "prod" if inventory_deployment_stage == "production"
  else "latest" }}
